apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservations-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reservations-api
  template:
    metadata:
      labels:
        app: reservations-api
    spec:
      initContainers:
        - name: init-db-and-wait
          image: mcr.microsoft.com/mssql/server:2022-latest
          env:
            - name: SA_PASSWORD
              value: "Password111!"
          command:
            - 'sh'
            - '-c'
            - |
              # Loop until the engine accepts a basic query
              # -C is used here because your deployment isn't using trusted certs yet
              until /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "$SA_PASSWORD" -C -Q "SELECT 1" > /dev/null 2>&1; do
                echo "Waiting for SQL Server engine to be fully queryable..."
                sleep 2
              done
              
              echo "SQL Server is up. Ensuring MaintenanceDb exists..."
              /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "$SA_PASSWORD" -C -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'G2ReservationsDb') CREATE DATABASE G2ReservationsDb"
      containers:
        - name: reservations-api
          image: distributed-applications-final-assignment-reservations-api:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "400m"
              memory: "1Gi"
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ConnectionStrings__DefaultConnection
              value: "Server=sqlserver,1433;Database=G2ReservationsDb;User Id=sa;Password=Password111!;TrustServerCertificate=True;Encrypt=False"
            - name: ServiceUrls__CustomersApi
              value: http://customers-api:8080/
            - name: ServiceUrls__VehicleInventoryApi
              value: http://vehicleinventory-api:8080/
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3